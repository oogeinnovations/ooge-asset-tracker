<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2d4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Box icon -->
  <g transform="translate(128, 100)">
    <!-- Box body -->
    <path d="M128 60 L248 10 L248 200 L128 250 L8 200 L8 10 Z" fill="url(#accent)" opacity="0.85"/>
    <path d="M128 60 L248 10 L248 200 L128 250 Z" fill="url(#accent)" opacity="0.65"/>
    <path d="M128 60 L8 10 L128 -40 L248 10 Z" fill="url(#accent)" opacity="1"/>
    <!-- Barcode lines on front face -->
    <rect x="50" y="100" width="4" height="60" fill="white" opacity="0.7"/>
    <rect x="60" y="100" width="8" height="60" fill="white" opacity="0.7"/>
    <rect x="74" y="100" width="3" height="60" fill="white" opacity="0.7"/>
    <rect x="82" y="100" width="6" height="60" fill="white" opacity="0.7"/>
    <rect x="94" y="100" width="4" height="60" fill="white" opacity="0.7"/>
    <rect x="104" y="100" width="8" height="60" fill="white" opacity="0.7"/>
    <rect x="118" y="100" width="3" height="60" fill="white" opacity="0.7"/>
  </g>
  <!-- OOGE text -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="white" letter-spacing="8">OOGE</text>
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="24" fill="#60a5fa" letter-spacing="4">ASSET TRACKER</text>
</svg>
